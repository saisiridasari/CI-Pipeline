name: MERN CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ---------------- BACKEND ----------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Backend
        working-directory: server
        run: npm install

      - name: Test Backend
        working-directory: server
        run: npm test

      # ---------------- FRONTEND ----------------
      - name: Install Frontend
        working-directory: client
        run: npm install

      - name: Build Frontend
        working-directory: client
        run: npm run build